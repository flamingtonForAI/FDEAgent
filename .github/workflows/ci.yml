name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ontology-assistant/package-lock.json
      - name: Install dependencies
        working-directory: ontology-assistant
        run: npm ci
      - name: Type check
        working-directory: ontology-assistant
        run: npx tsc --noEmit
      - name: Build
        working-directory: ontology-assistant
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ontology_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ontology-assistant/backend/package-lock.json
      - name: Install dependencies
        working-directory: ontology-assistant/backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: ontology-assistant/backend
        run: npx prisma generate
      - name: Build
        working-directory: ontology-assistant/backend
        run: npm run build
      - name: Run tests
        working-directory: ontology-assistant/backend
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ontology_test
          JWT_SECRET: test-secret-for-ci
